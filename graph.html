<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORE — Knowledge Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { width: 100%; }

:root {
  --bg:             #F4F1EA;
  --surface:        #FCFAF5;
  --surface-raised: #FFFFFF;
  --ink:            #0A0A0A;
  --ink-2:          #1C1C1C;
  --ink-3:          #3A3A3A;
  --dim:            #6E6A60;
  --dim-2:          #95918A;
  --dimmer:         #BAB6AC;
  --line:           rgba(10,10,10,.08);
  --line-2:         rgba(10,10,10,.14);
  --line-3:         rgba(10,10,10,.22);
  --accent:         #FF4D2E;
  --accent-soft:    #FFE2D9;
  --accent-glow:    rgba(255,77,46,.18);
  --radius:         14px;
  --radius-sm:      8px;
  --font-display:   'Instrument Serif', 'Times New Roman', serif;
  --font-body:      'Geist', system-ui, sans-serif;
  --font-mono:      'Geist Mono', 'Space Mono', monospace;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: rgba(10,10,10,.12); border-radius: 4px; }
::-webkit-scrollbar-track { background: transparent; }

/* ── Header ── */
.header {
  padding: 0 20px;
  height: 54px;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--dim);
  background: transparent;
  border: 1px solid var(--line-2);
  border-radius: 100px;
  padding: 5px 12px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: border-color .15s, color .15s, background .15s;
  letter-spacing: .01em;
  text-decoration: none;
}
.back-btn:hover {
  border-color: var(--ink);
  color: var(--ink);
  background: rgba(10,10,10,.03);
}

.header-title {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.header-title h1 {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: -.01em;
  line-height: 1;
}
.header-title h1 em {
  font-style: italic;
  color: var(--accent);
}
.header-title p {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--dim);
  letter-spacing: .1em;
  text-transform: uppercase;
}

.header-divider {
  width: 1px;
  height: 22px;
  background: var(--line-2);
  flex-shrink: 0;
}

.controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  flex: 1;
}

/* Level tabs */
.level-tabs {
  display: flex;
  gap: 3px;
  background: var(--bg);
  border: 1px solid var(--line-2);
  border-radius: 100px;
  padding: 3px;
}
.level-tab {
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font-mono);
  letter-spacing: .08em;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--dim);
  transition: background .15s, color .15s;
  white-space: nowrap;
}
.level-tab.active {
  background: var(--ink);
  color: var(--surface-raised);
}
.level-tab:not(.active):hover {
  color: var(--ink-2);
  background: rgba(10,10,10,.04);
}

/* Select */
select {
  font-family: var(--font-body);
  font-size: 12px;
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  background: var(--surface-raised);
  color: var(--ink);
  padding: 6px 10px;
  cursor: pointer;
  outline: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236E6A60' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 10px center;
  padding-right: 28px;
  transition: border-color .15s;
}
select:focus { border-color: var(--ink); }

/* Filter chips */
.filter-chips {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-wrap: wrap;
}

.filter-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 11px;
  border-radius: 100px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .08em;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--line-2);
  background: var(--bg);
  color: var(--dim);
  transition: all .15s;
  white-space: nowrap;
}
.filter-btn .chip-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.filter-btn.off { opacity: .4; }

.filter-btn[data-rel="sanksi_untuk"].active   { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
.filter-btn[data-rel="mengacu_ke"].active      { background: #dbeafe; color: #1d4ed8; border-color: #93c5fd; }
.filter-btn[data-rel="mensyaratkan"].active    { background: #dcfce7; color: #15803d; border-color: #86efac; }
.filter-btn[data-rel="diubah_oleh"].active     { background: #fef9c3; color: #b45309; border-color: #fde047; }
.filter-btn[data-rel="dicabut_oleh"].active    { background: #f3e8ff; color: #7c3aed; border-color: #c4b5fd; }

.chip-dot-sanksi    { background: #b91c1c; }
.chip-dot-mengacu   { background: #1d4ed8; }
.chip-dot-mensyarat { background: #15803d; }
.chip-dot-diubah    { background: #b45309; }
.chip-dot-dicabut   { background: #7c3aed; }

/* ── Main layout ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ── Graph canvas ── */
#graph {
  flex: 1;
  min-width: 0;
  background: var(--surface);
  position: relative;
}

/* Grid texture */
#graph::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(10,10,10,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10,10,10,.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* ── Side panel ── */
.side {
  width: 300px;
  background: var(--surface-raised);
  border-left: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width .25s cubic-bezier(.2,.7,.2,1);
  flex-shrink: 0;
}
.side.collapsed { width: 0; border: none; }

.side-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.side-header h3 {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
}
.side-close {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--bg);
  border: none;
  color: var(--dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  transition: background .15s, color .15s;
  font-family: var(--font-body);
}
.side-close:hover { background: var(--line-2); color: var(--ink); }

.side-body { flex: 1; overflow-y: auto; padding: 16px; }

.side-empty {
  color: var(--dim);
  font-size: 12px;
  text-align: center;
  padding-top: 40px;
  line-height: 1.6;
}

/* Node detail */
.detail-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 2px;
  letter-spacing: -.01em;
  line-height: 1.1;
}
.detail-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--dim-2);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.rel-section { margin-bottom: 16px; }
.rel-section-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  color: var(--dim-2);
  text-transform: uppercase;
  letter-spacing: .16em;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.rel-section-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }

.rel-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--line);
}
.rel-item:last-child { border-bottom: none; }

.rel-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 100px;
  white-space: nowrap;
  flex-shrink: 0;
  align-self: flex-start;
  margin-top: 2px;
  letter-spacing: .06em;
}
.rel-sanksi    { background: #fee2e2; color: #b91c1c; }
.rel-mengacu   { background: #dbeafe; color: #1d4ed8; }
.rel-mensyarat { background: #dcfce7; color: #15803d; }
.rel-diubah    { background: #fef9c3; color: #b45309; }
.rel-dicabut   { background: #f3e8ff; color: #7c3aed; }

.rel-info { flex: 1; min-width: 0; }
.rel-pasal {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.2;
}
.rel-pojk {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--dim);
  letter-spacing: .05em;
  margin-top: 2px;
}
.rel-ket {
  font-size: 11px;
  color: var(--dim-2);
  margin-top: 4px;
  font-style: italic;
  line-height: 1.5;
}

.role-tag {
  display: inline-flex;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 8px;
  font-weight: 500;
  padding: 1px 6px;
  border-radius: 100px;
  margin-right: 3px;
  margin-top: 4px;
  letter-spacing: .04em;
  white-space: nowrap;
}
.role-kewajiban  { background: #dcfce7; color: #15803d; }
.role-sanksi-tag { background: #fee2e2; color: #b91c1c; }
.role-lama  { background: #fef9c3; color: #b45309; }
.role-baru  { background: #dbeafe; color: #1d4ed8; }

/* Focus btn in side panel */
.focus-btn {
  width: 100%;
  margin-bottom: 10px;
  padding: 9px 14px;
  background: var(--ink);
  color: var(--surface-raised);
  border: none;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font-body);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background .15s;
  letter-spacing: .01em;
}
.focus-btn:hover { background: var(--ink-2); }
.focus-btn .btn-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

/* ── Legend ── */
.legend {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: var(--surface-raised);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  display: flex;
  gap: 4px 12px;
  flex-wrap: wrap;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--dim);
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
  z-index: 10;
  letter-spacing: .07em;
  align-items: center;
}
.leg {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 9px 3px 6px;
  border-radius: 100px;
  white-space: nowrap;
}
.leg-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.leg-dot.dashed {
  border-radius: 2px;
  background: repeating-linear-gradient(
    90deg, #b45309 0, #b45309 3px, transparent 3px, transparent 6px
  );
  width: 14px;
  height: 3px;
  margin: 2px 0;
}

/* ── Loading ── */
.loading {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--surface);
  gap: 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--dim);
  letter-spacing: .12em;
  text-transform: uppercase;
  z-index: 5;
}
.spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--line-2);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Pasal content in side panel ── */
.pasal-content-box {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 16px;
  font-size: 12px;
  color: var(--ink-3);
  line-height: 1.7;
  white-space: pre-wrap;
  max-height: 180px;
  overflow-y: auto;
}
.pasal-content-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--dim-2);
  margin-bottom: 8px;
  display: block;
}

/* vis-network tooltip override */
div.vis-tooltip {
  max-width: 280px;
  padding: 9px 11px;
  font-size: 11px;
  font-family: var(--font-body);
  line-height: 1.55;
  background: var(--surface-raised) !important;
  color: var(--ink) !important;
  border: 1px solid var(--line-2) !important;
  border-radius: var(--radius-sm) !important;
  box-shadow: 0 4px 16px rgba(0,0,0,.10) !important;
  white-space: pre-wrap;
  pointer-events: none;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="/" class="back-btn">← CORE</a>
    <div class="header-title">
      <h1>Knowledge <em>Graph</em></h1>
      <p>Peta relasi · klik node untuk detail</p>
    </div>
  </div>

  <div class="header-divider"></div>

  <div class="controls">
    <div class="level-tabs">
      <button class="level-tab active" onclick="setLevel('pojk',this)">Antar POJK</button>
      <button class="level-tab" onclick="setLevel('pasal',this)">Pasal dalam POJK</button>
    </div>

    <div class="header-divider"></div>

    <select id="pojk-universe-select" style="display:block" onchange="onUniverseChange()">
      <option value="">— Pilih POJK —</option>
      <option value="__all__">Seluruh Universe POJK</option>

    <select id="pojk-select" style="display:none" onchange="onPojkChange()">
      <option value="">— Pilih POJK —</option>

    <div class="header-divider"></div>

    <div class="filter-chips">
      <button class="filter-btn active" data-rel="sanksi_untuk" onclick="toggleFilter(this)">
        <span class="chip-dot chip-dot-sanksi"></span>sanksi
      </button>
      <button class="filter-btn active" data-rel="mengacu_ke" onclick="toggleFilter(this)">
        <span class="chip-dot chip-dot-mengacu"></span>rujukan
      </button>
      <button class="filter-btn active" data-rel="mensyaratkan" onclick="toggleFilter(this)">
        <span class="chip-dot chip-dot-mensyarat"></span>syarat
      </button>
      <button class="filter-btn active" data-rel="diubah_oleh" onclick="toggleFilter(this)">
        <span class="chip-dot chip-dot-diubah"></span>perubahan
      </button>
      <button class="filter-btn active" data-rel="dicabut_oleh" onclick="toggleFilter(this)">
        <span class="chip-dot chip-dot-dicabut"></span>pencabutan
      </button>

</div>

<div class="main">
  <div id="graph">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>Memuat data relasi...</span>

  </div>

  <div class="side collapsed" id="side">

      <h3 id="side-title">Detail</h3>
      <button class="side-close" onclick="closeSide()">✕</button>
    </div>
    <div class="side-body" id="side-body">
      <div class="side-empty">Klik node untuk melihat detail relasi</div>
    </div>
  </div>
</div>

<div class="legend">
  <div class="leg" style="background:#fee2e2;color:#b91c1c;">
    <span class="leg-dot" style="background:#b91c1c;"></span>sanksi
  </div>
  <div class="leg" style="background:#dbeafe;color:#1d4ed8;">
    <span class="leg-dot" style="background:#1d4ed8;"></span>rujukan
  </div>
  <div class="leg" style="background:#dcfce7;color:#15803d;">
    <span class="leg-dot" style="background:#15803d;"></span>syarat
  </div>
  <div class="leg" style="background:#fef9c3;color:#b45309;">
    <span class="leg-dot dashed"></span>perubahan
  </div>
  <div class="leg" style="background:#f3e8ff;color:#7c3aed;">
    <span class="leg-dot" style="background:#7c3aed;"></span>pencabutan
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://cqfxxdcjgtgqkstchxev.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxZnh4ZGNqZ3RncWtzdGNoeGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMTc5NzcsImV4cCI6MjA5Mzg5Mzk3N30.mIRF9fTC9YjNHuUdZrf3B2C2itw_q0Dd1aYfw7hA6Rs'

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

let network = null
let allEdgesData = []
let activeFilters = new Set(['sanksi_untuk','mengacu_ke','mensyaratkan','diubah_oleh','dicabut_oleh'])
let currentLevel = 'pojk'
let allRelations = []
let pasalContentMap = new Map() // pasal → content text

function shortLabel(src) {
  let m
  // "...Nomor 72/POJK.05/2016" → "POJK 72/2016"
  m = src.match(/Nomor\s+(\d+)\/POJK[^/]*\/(\d{4})/)
  if (m) return `POJK ${m[1]}/${m[2]}`
  // "...Nomor 72/SEOJK.05/2016" → "SEOJK 72/2016"
  m = src.match(/Nomor\s+(\d+)\/SEOJK[^/]*\/(\d{4})/)
  if (m) return `SEOJK ${m[1]}/${m[2]}`
  // "...Nomor 5 Tahun 2023" → "POJK 5/2023"
  m = src.match(/(?:Peraturan[^N]*|POJK[^N]*)Nomor\s+(\d+)\s+Tahun\s+(\d{4})/)
  if (m) return `POJK ${m[1]}/${m[2]}`
  // "POJK No. 23 Tahun 2023" → "POJK 23/2023"
  m = src.match(/^(POJK|SEOJK)\s+No\.\s*(\d+)\s+Tahun\s+(\d{4})/)
  if (m) return `${m[1]} ${m[2]}/${m[3]}`
  // Fallback: abbreviate long names
  if (src.length > 30) return src.replace(/Peraturan\s+Otoritas\s+Jasa\s+Keuangan\s*/i, 'POJK ').replace(/\s+/g,' ').slice(0, 28) + '…'
  return src
}

// ── Color & arrow config per relation type ──
const REL_CONFIG = {
  sanksi_untuk: {
    color: '#b91c1c',
    arrows: { to: { enabled: true, scaleFactor: 1.2 }, from: { enabled: false } },
    dashes: false,
    width: 2,
  },
  mengacu_ke: {
    color: '#1d4ed8',
    arrows: { to: { enabled: true, scaleFactor: 0.8 }, from: { enabled: false } },
    dashes: false,
    width: 1.5,
  },
  mensyaratkan: {
    color: '#15803d',
    arrows: { to: { enabled: true, scaleFactor: 0.8 }, from: { enabled: false } },
    dashes: false,
    width: 1.5,
  },
  diubah_oleh: {
    color: '#b45309',
    arrows: { to: { enabled: true, scaleFactor: 1.2 }, from: { enabled: false } },
    dashes: [6, 4],
    width: 2,
  },
  dicabut_oleh: {
    color: '#7c3aed',
    arrows: { to: { enabled: true, scaleFactor: 1.2 }, from: { enabled: false } },
    dashes: [4, 4],
    width: 1.5,
  },
}

async function supabaseGet(table, params) {
  const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`)
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v))
  const res = await fetch(url, {
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
    }
  })
  return res.json()
}

// ── LEVEL 1: POJK ↔ POJK graph ──
async function loadPojkGraph() {
  showLoading(true)

  // Fetch semua relasi
  const data = await supabaseGet('pojk_relations', {
    select: 'from_source,from_pasal,from_ayat,to_source,to_pasal,to_ayat,relation,keterangan',
    limit: 5000,
  })

  allRelations = data

  // Group: hitung relasi per pasangan POJK
  const pojkPairs = new Map()
  const pojkSet = new Set()

  for (const r of data) {
    pojkSet.add(r.from_source)
    pojkSet.add(r.to_source)
    if (r.from_source === r.to_source) continue // skip intra-POJK untuk level 1
    const key = `${r.from_source}|||${r.to_source}|||${r.relation}`
    if (!pojkPairs.has(key)) pojkPairs.set(key, [])
    pojkPairs.get(key).push(r)
  }

  // Nodes
  const pojkList = [...pojkSet]
  const nodes = pojkList.map((src, i) => {
    const short = shortLabel(src)
    return {
      id: src,
      label: short,
      shape: 'circle',
      size: 22,
      font: { size: 10, color: 'white', face: 'Geist', multi: false },
      color: { background: '#0A0A0A', border: 'transparent', highlight: { background: '#1C1C1C', border: 'transparent' }, hover: { background: '#1C1C1C', border: 'transparent' } },
      borderWidth: 0,
    }
  })

  // Edges — satu edge per pasangan+relasi, label = jumlah pasal
  const edges = []
  for (const [key, rels] of pojkPairs.entries()) {
    const [from, to, rel] = key.split('|||')
    if (!activeFilters.has(rel)) continue
    const cfg = REL_CONFIG[rel] || REL_CONFIG.mengacu_ke
    edges.push({
      id: key,
      from, to,
      relation: rel,
      rels,
      label: rels.length > 1 ? `${rels.length} pasal` : (rels[0].from_pasal || ''),
      font: { size: 9, color: cfg.color, align: 'middle' },
      color: { color: cfg.color, highlight: cfg.color },
      arrows: cfg.arrows,
      dashes: cfg.dashes,
      width: cfg.width,
      smooth: { type: 'curvedCW', roundness: 0.15 },
    })
  }

  allEdgesData = edges
  renderGraph(nodes, edges)

  // Klik node → tampilkan panel detail (tetap), tombol fokus ada di panel
  network.off('click')
  network.on('click', params => {
    if (params.nodes.length > 0) showNodeDetail(params.nodes[0], nodes, edges, 'pojk')
    else if (params.edges.length > 0) showEdgeDetail(params.edges[0], allEdgesData)
    else closeSide()
  })
  showLoading(false)
}

function focusPojkEgo(focus) {
  // Filter relasi yang melibatkan focus
  const egoRels = allRelations.filter(r =>
    (r.from_source === focus || r.to_source === focus) && r.from_source !== r.to_source
  )

  const pojkSet = new Set([focus])
  for (const r of egoRels) { pojkSet.add(r.from_source); pojkSet.add(r.to_source) }

  // Nodes
  const nodes = [...pojkSet].map(src => ({
    id: src,
    label: shortLabel(src),
    shape: 'circle',
    size: src === focus ? 30 : 20,
    font: { size: src === focus ? 12 : 10, color: 'white', face: 'Geist, sans-serif' },
    color: { background: src === focus ? '#FF4D2E' : '#0A0A0A', border: 'transparent', highlight: { background: src === focus ? '#E03D20' : '#1C1C1C', border: 'transparent' }, hover: { background: src === focus ? '#E03D20' : '#1C1C1C', border: 'transparent' } },
    borderWidth: 0,
  }))

  // Node "← Semua POJK"
  nodes.push({
    id: '__back__',
    label: '← Semua POJK',
    shape: 'box',
    font: { size: 10, color: '#6E6A60', face: 'Geist, sans-serif' },
    color: { background: '#F4F1EA', border: 'rgba(10,10,10,.14)', highlight: { background: '#ECE7DC', border: 'rgba(10,10,10,.22)' }, hover: { background: '#ECE7DC', border: 'rgba(10,10,10,.22)' } },
    borderWidth: 1,
    margin: { top: 6, bottom: 6, left: 12, right: 12 },
  })

  // Edges agregasi per pasangan+relasi
  const edgeMap = new Map()
  for (const r of egoRels) {
    if (!activeFilters.has(r.relation)) continue
    const key = `${r.from_source}|||${r.to_source}|||${r.relation}`
    if (!edgeMap.has(key)) edgeMap.set(key, { from: r.from_source, to: r.to_source, relation: r.relation, rels: [] })
    edgeMap.get(key).rels.push(r)
  }
  const edges = []
  for (const [key, eg] of edgeMap.entries()) {
    const cfg = REL_CONFIG[eg.relation] || REL_CONFIG.mengacu_ke
    edges.push({
      id: key, from: eg.from, to: eg.to, relation: eg.relation, rels: eg.rels,
      label: eg.rels.length > 1 ? `${eg.rels.length} pasal` : (eg.rels[0].from_pasal || ''),
      font: { size: 9, color: cfg.color, align: 'middle' },
      color: { color: cfg.color, highlight: cfg.color },
      arrows: cfg.arrows, dashes: cfg.dashes, width: cfg.width,
      smooth: { type: 'curvedCW', roundness: 0.15 },
    })
  }

  allEdgesData = edges
  renderGraph(nodes, edges)

  network.off('click')
  network.on('click', params => {
    if (params.nodes.length > 0) {
      const id = params.nodes[0]
      if (id === '__back__') { loadPojkGraph(); return }
      showNodeDetail(id, nodes, edges, 'pojk')
    } else if (params.edges.length > 0) {
      showEdgeDetail(params.edges[0], edges)
    } else closeSide()
  })
}

// ── LEVEL 2a: Bab/Bagian summary untuk satu POJK ──
let currentPasalSource = null
let babStructure = null // cache { babOrder, babMap, allRelations }

async function loadPasalGraph(source) {
  if (!source) source = document.getElementById('pojk-select').value
  if (!source) return
  currentPasalSource = source
  showLoading(true)

  const norm = s => s ? s.replace(/\s+/g,' ').trim() : s

  const [chunksRes, outRelsRes, inRelsRes] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/pojk_chunks?select=pasal,bab,bab_title,content&source=eq.${encodeURIComponent(source)}&limit=5000`, { headers: { 'apikey': SUPABASE_ANON } }),
    fetch(`${SUPABASE_URL}/rest/v1/pojk_relations?select=from_pasal,from_ayat,from_source,to_pasal,to_ayat,to_source,relation,keterangan&from_source=eq.${encodeURIComponent(source)}&limit=5000`, { headers: { 'apikey': SUPABASE_ANON } }),
    fetch(`${SUPABASE_URL}/rest/v1/pojk_relations?select=from_pasal,from_ayat,from_source,to_pasal,to_ayat,to_source,relation,keterangan&to_source=eq.${encodeURIComponent(source)}&from_source=neq.${encodeURIComponent(source)}&limit=2000`, { headers: { 'apikey': SUPABASE_ANON } }),
  ])
  const chunks = await chunksRes.json()
  allRelations = [...(await outRelsRes.json()), ...(await inRelsRes.json())]

  // Build pasal content map for tooltips & side panel
  pasalContentMap = new Map()
  for (const c of chunks) {
    const p = norm(c.pasal)
    pasalContentMap.set(p, c.content || '')
  }

  const babOrder = [], babMap = new Map(), pasalBab = new Map()
  for (const c of chunks) {
    const babKey = norm(c.bab || 'lainnya')
    const babLabel = norm(c.bab_title || c.bab || 'Lainnya')
    const pasal = norm(c.pasal)
    if (!babMap.has(babKey)) { babMap.set(babKey, { label: babLabel, pasalList: [] }); babOrder.push(babKey) }
    const entry = babMap.get(babKey)
    if (!entry.pasalList.includes(pasal)) entry.pasalList.push(pasal)
    if (!pasalBab.has(pasal)) pasalBab.set(pasal, babKey)
  }
  babStructure = { babOrder, babMap, pasalBab, source, norm }

  // Hitung jumlah relasi (intra + cross-POJK) per bab
  const babRelCount = new Map()
  for (const r of allRelations) {
    const isOut = r.from_source === source || !r.from_source
    const localPasal = isOut ? norm(r.from_pasal) : norm(r.to_pasal)
    const bab = pasalBab.get(localPasal)
    if (bab) babRelCount.set(bab, (babRelCount.get(bab) || 0) + 1)
  }

  // Nodes = satu node per bab
  const nodes = babOrder.map(babKey => {
    const { label, pasalList } = babMap.get(babKey)
    const relCount = babRelCount.get(babKey) || 0
    const shortBab = label.length > 28 ? label.slice(0,26)+'…' : label
    return {
      id: `bab|||${babKey}`,
      label: `${shortBab}\n${pasalList.length} pasal · ${relCount} relasi`,
      babKey,
      shape: 'box',
      font: { size: 11, color: 'white', face: 'Geist', multi: false },
      color: { background: '#0A0A0A', border: 'transparent', highlight: { background: '#1C1C1C', border: 'transparent' }, hover: { background: '#1C1C1C', border: 'transparent' } },
      borderWidth: 0,
      margin: { top: 10, bottom: 10, left: 14, right: 14 },
    }
  })

  // Edge antar bab: intra-POJK + cross-POJK (external nodes)
  const extSourceSet = new Set()
  const babEdgeMap = new Map()
  for (const r of allRelations) {
    if (!activeFilters.has(r.relation)) continue
    const isOut = r.from_source === source || !r.from_source
    const isCross = isOut ? (r.to_source && r.to_source !== source) : true

    if (!isCross) {
      // Intra-POJK: bab → bab
      const fp = norm(r.from_pasal), tp = norm(r.to_pasal)
      const fromBab = pasalBab.get(fp), toBab = pasalBab.get(tp)
      if (!fromBab || !toBab || fromBab === toBab) continue
      const key = `${fromBab}|||${toBab}|||${r.relation}`
      if (!babEdgeMap.has(key)) babEdgeMap.set(key, { fromId: `bab|||${fromBab}`, toId: `bab|||${toBab}`, relation: r.relation, rels: [] })
      babEdgeMap.get(key).rels.push(r)
    } else if (isOut) {
      // Outgoing cross-POJK: bab → external POJK node
      const fp = norm(r.from_pasal)
      const fromBab = pasalBab.get(fp)
      if (!fromBab) continue
      const extSrc = r.to_source
      extSourceSet.add(extSrc)
      const key = `${fromBab}|||ext|||${extSrc}|||${r.relation}`
      if (!babEdgeMap.has(key)) babEdgeMap.set(key, { fromId: `bab|||${fromBab}`, toId: `ext|||${extSrc}`, relation: r.relation, rels: [] })
      babEdgeMap.get(key).rels.push(r)
    } else {
      // Incoming cross-POJK: external POJK node → bab
      const tp = norm(r.to_pasal)
      const toBab = pasalBab.get(tp)
      if (!toBab) continue
      const extSrc = r.from_source
      extSourceSet.add(extSrc)
      const key = `ext|||${extSrc}|||${toBab}|||${r.relation}`
      if (!babEdgeMap.has(key)) babEdgeMap.set(key, { fromId: `ext|||${extSrc}`, toId: `bab|||${toBab}`, relation: r.relation, rels: [] })
      babEdgeMap.get(key).rels.push(r)
    }
  }

  // Tambah external POJK nodes
  for (const extSrc of extSourceSet) {
    nodes.push({
      id: `ext|||${extSrc}`,
      label: shortLabel(extSrc),
      shape: 'box',
      font: { size: 10, color: '#6E6A60', face: 'Geist, sans-serif' },
      color: { background: '#F4F1EA', border: 'rgba(10,10,10,.22)', highlight: { background: '#ECE7DC', border: 'rgba(10,10,10,.3)' }, hover: { background: '#ECE7DC', border: 'rgba(10,10,10,.3)' } },
      borderWidth: 1,
      margin: { top: 8, bottom: 8, left: 12, right: 12 },
    })
  }

  const edges = []
  for (const [key, eg] of babEdgeMap.entries()) {
    const cfg = REL_CONFIG[eg.relation] || REL_CONFIG.mengacu_ke
    edges.push({
      id: key, from: eg.fromId, to: eg.toId,
      relation: eg.relation, rels: eg.rels,
      label: `${eg.rels.length}×`,
      font: { size: 9, color: cfg.color, align: 'middle', strokeWidth: 2, strokeColor: 'white' },
      color: { color: cfg.color, highlight: cfg.color },
      arrows: cfg.arrows, dashes: cfg.dashes, width: cfg.width,
      smooth: { type: 'curvedCW', roundness: 0.15 },
    })
  }

  allEdgesData = edges
  renderGraph(nodes, edges, false)

  // Override click handler untuk drill-down
  network.off('click')
  network.on('click', params => {
    if (params.nodes.length > 0) {
      const nodeId = params.nodes[0]
      if (nodeId.startsWith('bab|||')) {
        const babKey = nodeId.replace('bab|||', '')
        drillIntoBab(babKey)
      } else {
        showNodeDetail(nodeId, [...(network?.body?.data?.nodes?.get() || [])], allEdgesData)
      }
    } else if (params.edges.length > 0) {
      showEdgeDetail(params.edges[0], allEdgesData)
    } else {
      closeSide()
    }
  })

  showLoading(false)
}

// ── LEVEL 2b: Drill-down ke satu Bab ──
function drillIntoBab(babKey) {
  if (!babStructure) return
  const { babMap, pasalBab, source, norm } = babStructure
  const bab = babMap.get(babKey)
  if (!bab) return
  showLoading(true)

  const pasalSet = new Set(bab.pasalList)

  // Back button: level -1 (paling kiri)
  const nodes = [{
    id: '__back__',
    label: '← Kembali',
    shape: 'box',
    level: 0,
    font: { size: 11, color: '#6E6A60', face: 'Geist, sans-serif' },
    color: { background: '#F4F1EA', border: 'rgba(10,10,10,.14)', highlight: { background: '#ECE7DC', border: 'rgba(10,10,10,.22)' }, hover: { background: '#ECE7DC', border: 'rgba(10,10,10,.22)' } },
    borderWidth: 1,
    margin: { top: 8, bottom: 8, left: 12, right: 12 },
  }]

  for (const pasal of bab.pasalList) {
    const isSanksi = /sanksi|peringatan/i.test(pasal)
    const content = pasalContentMap.get(pasal) || ''
    const preview = content.length > 320 ? content.slice(0, 320) + '…' : content
    const tooltipEl = document.createElement('div')
    tooltipEl.textContent = preview
    nodes.push({
      id: `${source}|||${pasal}`,
      label: pasal,
      title: preview ? tooltipEl : undefined,
      shape: 'box',
      level: 1,
      font: { size: 11, color: 'white', face: 'Geist' },
      color: {
        background: isSanksi ? '#b91c1c' : '#0A0A0A',
        border: 'transparent',
        highlight: { background: isSanksi ? '#991b1b' : '#1C1C1C', border: 'transparent' },
        hover: { background: isSanksi ? '#991b1b' : '#1C1C1C', border: 'transparent' },
      },
      borderWidth: 0,
      margin: { top: 7, bottom: 7, left: 12, right: 12 },
    })
  }

  // Relasi: outgoing (from bab ini) + incoming cross-POJK (ke bab ini)
  const addedNodes = new Set(nodes.map(n => n.id))
  const edgeMap = new Map()

  for (const r of allRelations) {
    if (!activeFilters.has(r.relation)) continue
    const isOut = r.from_source === source || !r.from_source

    if (isOut) {
      const fp = norm(r.from_pasal)
      if (!pasalSet.has(fp)) continue
      const tp = norm(r.to_pasal)
      if (fp === tp && (!r.to_source || r.to_source === source)) continue
      const isCross = r.to_source && r.to_source !== source
      const toId = isCross ? `ext|||${r.to_source}|||${tp}` : `${source}|||${tp}`
      const key = `${source}|||${fp}|||${toId}|||${r.relation}`
      if (!edgeMap.has(key)) edgeMap.set(key, { fromId: `${source}|||${fp}`, toId, isCross, extSrc: r.to_source, toP: tp, relation: r.relation, rels: [] })
      edgeMap.get(key).rels.push(r)
    } else {
      // Incoming cross-POJK: from_source berbeda, to_pasal ada di bab ini
      const tp = norm(r.to_pasal)
      if (!pasalSet.has(tp)) continue
      const fp = norm(r.from_pasal)
      const extSrc = r.from_source
      const fromId = `ext|||${extSrc}|||${fp}`
      const toId = `${source}|||${tp}`
      const key = `${fromId}|||${toId}|||${r.relation}`
      if (!edgeMap.has(key)) edgeMap.set(key, { fromId, toId, isCross: true, extSrc, fromP: fp, toP: tp, relation: r.relation, rels: [] })
      edgeMap.get(key).rels.push(r)
    }
  }

  const edges = []
  for (const [key, eg] of edgeMap.entries()) {
    // Pastikan node target ada
    if (!addedNodes.has(eg.toId)) {
      if (eg.toId.startsWith('ext|||')) {
        const [, extSrc, extPasal] = eg.toId.split('|||')
        nodes.push({ id: eg.toId, label: `${extPasal}\n${shortLabel(extSrc)}`, shape: 'box', level: 2,
          font: { size: 10, color: '#6E6A60', face: 'Geist, sans-serif' },
          color: { background: '#F4F1EA', border: 'rgba(10,10,10,.22)', highlight: { background: '#ECE7DC', border: 'rgba(10,10,10,.3)' }, hover: { background: '#ECE7DC', border: 'rgba(10,10,10,.3)' } },
          borderWidth: 1, margin: { top: 5, bottom: 5, left: 8, right: 8 } })
      } else {
        const toP = eg.toP || eg.toId.split('|||')[1]
        const toBab = pasalBab.get(toP)
        const toBabLabel = toBab ? (babMap.get(toBab)?.label || toBab).slice(0,18) : 'bab lain'
        nodes.push({ id: eg.toId, label: `${toP}\n(${toBabLabel})`, shape: 'box', level: 2,
          font: { size: 10, color: '#6E6A60', face: 'Geist, sans-serif' },
          color: { background: '#F4F1EA', border: 'rgba(10,10,10,.14)', highlight: { background: '#ECE7DC', border: 'rgba(10,10,10,.22)' }, hover: { background: '#ECE7DC', border: 'rgba(10,10,10,.22)' } },
          borderWidth: 1, margin: { top: 5, bottom: 5, left: 8, right: 8 } })
      }
      addedNodes.add(eg.toId)
    }
    // Pastikan node sumber (incoming) ada
    if (!addedNodes.has(eg.fromId) && eg.fromId.startsWith('ext|||')) {
      const [, extSrc, extPasal] = eg.fromId.split('|||')
      nodes.push({ id: eg.fromId, label: `${extPasal}\n${shortLabel(extSrc)}`, shape: 'box', level: 0,
        font: { size: 10, color: '#6E6A60', face: 'Geist, sans-serif' },
        color: { background: '#F4F1EA', border: 'rgba(10,10,10,.22)', highlight: { background: '#ECE7DC', border: 'rgba(10,10,10,.3)' }, hover: { background: '#ECE7DC', border: 'rgba(10,10,10,.3)' } },
        borderWidth: 1, margin: { top: 5, bottom: 5, left: 8, right: 8 } })
      addedNodes.add(eg.fromId)
    }

    const cfg = REL_CONFIG[eg.relation] || REL_CONFIG.mengacu_ke
    const lbl = eg.rels.length > 1 ? `${eg.rels.length}×` : (eg.rels[0].from_ayat || '')
    edges.push({
      id: key, from: eg.fromId, to: eg.toId,
      relation: eg.relation, rels: eg.rels, label: lbl,
      font: { size: 9, color: cfg.color, align: 'middle', strokeWidth: 2, strokeColor: 'white' },
      color: { color: cfg.color, highlight: cfg.color },
      arrows: cfg.arrows, dashes: cfg.dashes, width: cfg.width,
      smooth: { type: 'curvedCW', roundness: 0.15 },
    })
  }

  allEdgesData = edges
  renderGraph(nodes, edges, false)

  network.off('click')
  network.on('click', params => {
    if (params.nodes.length > 0) {
      if (params.nodes[0] === '__back__') { loadPasalGraph(source); return }
      showNodeDetail(params.nodes[0], nodes, edges)
    } else if (params.edges.length > 0) {
      showEdgeDetail(params.edges[0], edges)
    } else closeSide()
  })

  showLoading(false)
}

async function onPojkChange() {
  const source = document.getElementById('pojk-select').value
  if (!source) return
  loadPasalGraph(source)
}

function renderGraph(nodes, edges, hierarchical = false) {
  const container = document.getElementById('graph')

  // Remove loading overlay but keep graph div
  const loading = document.getElementById('loading')
  if (loading) loading.style.display = 'none'

  const data = {
    nodes: new vis.DataSet(nodes),
    edges: new vis.DataSet(edges),
  }

  const options = hierarchical ? {
    physics: { enabled: false },
    layout: {
      hierarchical: {
        enabled: true,
        direction: 'LR',
        sortMethod: 'directed',
        levelSeparation: 260,
        nodeSpacing: 80,
        treeSpacing: 100,
        blockShifting: true,
        edgeMinimization: true,
        parentCentralization: true,
      },
    },
    interaction: { hover: true, tooltipDelay: 100, zoomView: true },
    edges: {
      smooth: false,
      font: { size: 9, strokeWidth: 3, strokeColor: '#FCFAF5', face: 'Geist Mono, monospace' },
    },
    nodes: { borderWidth: 0, shadow: false },
  } : {
    physics: {
      enabled: true,
      solver: 'forceAtlas2Based',
      forceAtlas2Based: { gravitationalConstant: -72, centralGravity: 0.01, springLength: 190, springConstant: 0.06 },
      stabilization: { iterations: 200 },
    },
    interaction: { hover: true, tooltipDelay: 100, navigationButtons: false, zoomView: true },
    layout: { randomSeed: 42 },
    edges: {
      smooth: { type: 'curvedCW', roundness: 0.15 },
      font: { size: 9, strokeWidth: 3, strokeColor: '#FCFAF5', face: 'Geist Mono, monospace' },
    },
    nodes: { borderWidth: 0, shadow: false },
  }

  if (network) network.destroy()
  network = new vis.Network(container, data, options)

  network.once('stabilizationIterationsDone', () => {
    network.setOptions({ physics: { enabled: false } })
    network.fit({ animation: { duration: 600, easingFunction: 'easeInOutQuad' } })
  })
  // Also fit immediately if physics disabled (hierarchical)
  if (!hierarchical) {
    network.once('afterDrawing', () => {}) // force canvas update
  } else {
    network.fit({ animation: false })
  }

  network.on('click', params => {
    if (params.nodes.length > 0) showNodeDetail(params.nodes[0], nodes, edges)
    else if (params.edges.length > 0) showEdgeDetail(params.edges[0], edges)
    else closeSide()
  })
}

// ── Side panel: node detail ──
function showNodeDetail(nodeId, nodes, edges, context) {
  const node = nodes.find(n => n.id === nodeId)
  if (!node) return

  const outEdges = edges.filter(e => e.from === nodeId)
  const inEdges  = edges.filter(e => e.to   === nodeId)

  const label = node.label.replace(/\n/g, ' ')
  document.getElementById('side-title').textContent = label

  // Tombol fokus untuk POJK level
  const focusBtn = (context === 'pojk' && nodeId !== '__back__')
    ? `<button class="focus-btn" onclick="focusPojkEgo('${nodeId.replace(/'/g,"\\'")}'); closeSide()"><span class="btn-dot"></span>Tampilkan koneksi POJK ini</button>`
    : ''

  // Show pasal content / external node info
  let contentHtml = ''
  const parts = nodeId.split('|||')
  if (parts[0] === 'ext' && parts.length === 3) {
    // External cross-POJK pasal: ext|||source|||pasal
    contentHtml = `<div style="margin-top:8px;padding:8px 12px;background:rgba(10,10,10,.04);border-radius:8px;font-size:12px;color:var(--dim);">📌 Pasal dari <strong style="color:var(--ink)">${escHtml(shortLabel(parts[1]))}</strong></div>`
  } else if (parts[0] === 'ext' && parts.length === 2) {
    // External POJK node (bab-level): ext|||source
    contentHtml = `<div style="margin-top:8px;padding:8px 12px;background:rgba(10,10,10,.04);border-radius:8px;font-size:12px;color:var(--dim);">📌 POJK Eksternal: <strong style="color:var(--ink)">${escHtml(shortLabel(parts[1]))}</strong></div>`
  } else if (parts.length === 2) {
    // Local pasal: source|||Pasal X
    const pasal = parts[1]
    const content = pasalContentMap.get(pasal)
    if (content) {
      contentHtml = `<span class="pasal-content-label">Isi Pasal</span><div class="pasal-content-box">${escHtml(content)}</div>`
    }
  }

  let html = focusBtn + contentHtml + `<div class="detail-sub">${outEdges.length} relasi keluar · ${inEdges.length} relasi masuk</div>`

  if (outEdges.length) {
    html += `<div class="rel-section"><div class="rel-section-label">Keluar ▶</div>`
    for (const e of outEdges) {
      for (const r of (e.rels || [])) {
        html += renderRelItem(r, 'out')
      }
    }
    html += `</div>`
  }

  if (inEdges.length) {
    html += `<div class="rel-section"><div class="rel-section-label">◀ Masuk</div>`
    for (const e of inEdges) {
      for (const r of (e.rels || [])) {
        html += renderRelItem(r, 'in')
      }
    }
    html += `</div>`
  }

  document.getElementById('side-body').innerHTML = html
  document.getElementById('side').classList.remove('collapsed')
}

function showEdgeDetail(edgeId, edges) {
  const edge = edges.find(e => e.id === edgeId)
  if (!edge) return

  document.getElementById('side-title').textContent = edge.relation

  let html = ''
  for (const r of (edge.rels || [])) {
    html += renderRelItem(r, 'edge')
  }
  document.getElementById('side-body').innerHTML = html
  document.getElementById('side').classList.remove('collapsed')
}

function renderRelItem(r, dir) {
  const badgeClass = {
    sanksi_untuk: 'rel-sanksi',
    mengacu_ke: 'rel-mengacu',
    mensyaratkan: 'rel-mensyarat',
    diubah_oleh: 'rel-diubah',
    dicabut_oleh: 'rel-dicabut',
  }[r.relation] || 'rel-mengacu'

  const REL_LABEL = {
    mengacu_ke:   { out: 'mengacu ke',        in: 'diacu oleh',          edge: 'mengacu ke' },
    mensyaratkan: { out: 'mensyaratkan',       in: 'disyaratkan oleh',    edge: 'mensyaratkan' },
    sanksi_untuk: { out: 'sanksi untuk',       in: 'dikenai sanksi dari', edge: 'sanksi untuk' },
    diubah_oleh:  { out: 'diubah oleh',        in: 'mengubah',            edge: 'diubah oleh' },
    dicabut_oleh: { out: 'dicabut oleh',       in: 'mencabut',            edge: 'dicabut oleh' },
  }
  const relLabel = (REL_LABEL[r.relation] || { out: r.relation, in: r.relation, edge: r.relation })[dir] || r.relation

  let roleTags = ''

  let targetPasal, targetPojk
  if (dir === 'in') {
    targetPasal = `${r.from_pasal}${r.from_ayat ? ' <span class="rel-pojk">'+r.from_ayat+'</span>' : ''}`
    targetPojk = r.from_source
  } else if (dir === 'edge') {
    const fromP = `${r.from_pasal}${r.from_ayat ? ' '+r.from_ayat : ''}`
    const toP = `${r.to_pasal}${r.to_ayat ? ' '+r.to_ayat : ''}`
    targetPasal = `${fromP} <span style="color:var(--dimmer)">→</span> ${toP}`
    targetPojk = (r.from_source && r.to_source && r.from_source !== r.to_source)
      ? `${escHtml(shortLabel(r.from_source))} → ${escHtml(shortLabel(r.to_source))}`
      : (r.from_source || r.to_source || '')
  } else {
    targetPasal = `${r.to_pasal}${r.to_ayat ? ' <span class="rel-pojk">'+r.to_ayat+'</span>' : ''}`
    targetPojk = r.to_source
  }

  return `
    <div class="rel-item">
      <span class="rel-badge ${badgeClass}">${relLabel}</span>
      <div class="rel-info">
        <div class="rel-pasal">${targetPasal}</div>
        <div class="rel-pojk">${targetPojk}</div>
        ${roleTags}
        ${r.keterangan ? `<div class="rel-ket">${r.keterangan}</div>` : ''}
      </div>
    </div>`
}

function closeSide() {
  document.getElementById('side').classList.add('collapsed')
}

// ── Filter toggle ──
function toggleFilter(btn) {
  const rel = btn.dataset.rel
  if (activeFilters.has(rel)) {
    activeFilters.delete(rel)
    btn.classList.add('off')
    btn.classList.remove('active')
  } else {
    activeFilters.add(rel)
    btn.classList.remove('off')
    btn.classList.add('active')
  }
  if (currentLevel === 'pojk') {
    const val = document.getElementById('pojk-universe-select').value
    if (val === '__all__') loadPojkGraph()
    else if (val) focusPojkEgo(val)
  } else {
    loadPasalGraph()
  }
}

// ── Level switch ──
async function setLevel(level, btn) {
  currentLevel = level
  document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')

  const pojkSel = document.getElementById('pojk-select')
  const univSel = document.getElementById('pojk-universe-select')
  if (level === 'pasal') {
    pojkSel.style.display = 'block'
    univSel.style.display = 'none'
    if (!pojkSel.options.length || pojkSel.options.length === 1) await populatePojkSelect()
    if (network) { network.destroy(); network = null }
    document.getElementById('loading').style.display = 'none'
  } else {
    pojkSel.style.display = 'none'
    univSel.style.display = 'block'
    if (univSel.options.length <= 2) await populateUniverseSelect()
    // Don't auto-load — wait for user selection
    if (network) { network.destroy(); network = null }
    document.getElementById('loading').style.display = 'none'
  }
  closeSide()
}

async function populatePojkSelect() {
  const data = await supabaseGet('pojk_list', { select: 'nama', order: 'tahun.asc,nomor.asc' })
  const sel = document.getElementById('pojk-select')
  sel.innerHTML = '<option value="">— Pilih POJK —</option>'
  for (const p of data) {
    const opt = document.createElement('option')
    opt.value = p.nama
    opt.textContent = shortLabel(p.nama)
    sel.appendChild(opt)
  }
}

async function populateUniverseSelect() {
  const data = await supabaseGet('pojk_list', { select: 'nama', order: 'tahun.asc,nomor.asc' })
  const sel = document.getElementById('pojk-universe-select')
  sel.innerHTML = '<option value="">— Pilih POJK —</option><option value="__all__">🌐 Seluruh Universe POJK</option>'
  for (const p of data) {
    const opt = document.createElement('option')
    opt.value = p.nama
    opt.textContent = shortLabel(p.nama)
    sel.appendChild(opt)
  }
}

async function ensureRelationsLoaded() {
  if (allRelations.length) return
  showLoading(true)
  const data = await supabaseGet('pojk_relations', {
    select: 'from_source,from_pasal,from_ayat,to_source,to_pasal,to_ayat,relation,keterangan',
    limit: 5000,
  })
  allRelations = data
  showLoading(false)
}

async function onUniverseChange() {
  const val = document.getElementById('pojk-universe-select').value
  if (!val) return
  if (val === '__all__') {
    await loadPojkGraph()
  } else {
    await ensureRelationsLoaded()
    focusPojkEgo(val)
  }
}

function showLoading(show) {
  let el = document.getElementById('loading')
  if (!el) return
  el.style.display = show ? 'flex' : 'none'
}

// Init — embed mode + auto-load from URL params if present
;(async () => {
  const params = new URLSearchParams(location.search)
  const embed = params.get('embed') === '1'
  if (embed) {
    // Sembunyikan hanya tombol ← CORE dan judul, bukan controls
    document.querySelector('.header-left').style.display = 'none'
  }

  await populateUniverseSelect()
  const src = params.get('source')
  const level = params.get('level') || 'pasal'

  if (!src) return

  // Small delay to ensure vis-network container is sized
  await new Promise(r => setTimeout(r, 120))

  if (level === 'pasal') {
    const pasalTab = document.querySelectorAll('.level-tab')[1]
    await setLevel('pasal', pasalTab)
    const sel = document.getElementById('pojk-select')
    if (!sel.options.length || sel.options.length === 1) await populatePojkSelect()
    const opt = [...sel.options].find(o => o.value === src)
    if (opt) { sel.value = src; await loadPasalGraph(src) }
  } else {
    // pojk level — update tab state
    const pojkTab = document.querySelectorAll('.level-tab')[0]
    document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'))
    pojkTab.classList.add('active')
    currentLevel = 'pojk'
    document.getElementById('pojk-select').style.display = 'none'
    document.getElementById('pojk-universe-select').style.display = 'block'
    const univSel = document.getElementById('pojk-universe-select')
    const univOpt = [...univSel.options].find(o => o.value === src)
    if (univOpt) univSel.value = src
    await ensureRelationsLoaded()
    focusPojkEgo(src)
  }
})()
</script>
